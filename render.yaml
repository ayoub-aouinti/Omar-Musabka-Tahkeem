databases:
  - name: tahkeem-db
    plan: free
    databaseName: tahkeem
    user: tahkeem
    region: frankfurt

services:
  - type: web
    name: tahkeem-api
    runtime: node
    plan: free
    region: frankfurt
    branch: main
    buildCommand: >-
      corepack enable &&
      pnpm install --frozen-lockfile &&
      pnpm shared:build &&
      pnpm --filter @tahkeem/api prisma:generate &&
      pnpm --filter @tahkeem/api build
    startCommand: >-
      pnpm --filter @tahkeem/api prisma:migrate &&
      pnpm --filter @tahkeem/api start:prod
    envVars:
      - key: NODE_VERSION
        value: 20.18.0
      - key: DATABASE_URL
        fromDatabase:
          name: tahkeem-db
          property: connectionString
      # Tighten this to the Vercel URL once the web app is deployed (see DEPLOY.md).
      - key: CORS_ORIGINS
        value: "http://localhost:5173,http://localhost:8081"
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_ADMIN_TTL
        value: 12h
      - key: JWT_JUDGE_TTL
        value: 8h
      - key: SEED_ADMIN_EMAIL
        value: admin@omar-quran.tn
      - key: SEED_ADMIN_PASSWORD
        generateValue: true
